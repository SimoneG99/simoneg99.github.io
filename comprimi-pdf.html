<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprimi PDF – Riduci le dimensioni | PDFlow</title>
    <meta name="description" content="Comprimi i tuoi PDF direttamente nel browser. Vedi la riduzione di dimensione in tempo reale e scarica il file ottimizzato.">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 2.5rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        /* File info */
        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
        }

        .file-info.visible {
            display: flex;
        }

        .file-detail {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-name {
            font-weight: 500;
            word-break: break-word;
        }

        .file-size {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-size: 1rem;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .compress-btn {
            display: none;
            margin-top: 1.5rem;
            width: fit-content;
        }

        .compress-btn.visible {
            display: block;
        }

        /* Risultato compressione */
        .result-panel {
            display: none;
            margin-top: 2rem;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .result-panel.visible {
            display: flex;
        }

        .size-comparison {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .size-box {
            text-align: center;
        }

        .size-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        .size-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .arrow {
            font-size: 2rem;
            color: #ffd200;
        }

        .saved-badge {
            background: rgba(255,215,0,0.2);
            color: #ffd200;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>Comprimi PDF</h1>
            <p>Riduci la dimensione del file mantenendo la qualità. Vedi quanto spazio hai risparmiato.</p>
        </div>

        <!-- Upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input" class="upload-label">
                Trascina qui il tuo PDF<br>oppure <span>clicca per caricarlo</span>
            </label>
        </div>

        <!-- Info file -->
        <div class="file-info" id="file-info">
            <div class="file-detail">
                <span>📄</span>
                <span class="file-name" id="file-name-display"></span>
            </div>
            <span class="file-size" id="original-size"></span>
        </div>

        <button class="btn compress-btn" id="compress-btn">Comprimi PDF</button>

        <!-- Risultato -->
        <div class="result-panel" id="result-panel">
            <div class="size-comparison">
                <div class="size-box">
                    <div class="size-label">Prima</div>
                    <div class="size-value" id="before-size"></div>
                </div>
                <div class="arrow">→</div>
                <div class="size-box">
                    <div class="size-label">Dopo</div>
                    <div class="size-value" id="after-size" style="color:#ffd200;"></div>
                </div>
            </div>
            <div class="saved-badge" id="saved-badge"></div>
            <button class="btn" id="download-btn">Scarica PDF compresso</button>
        </div>

        <!-- Spazio pubblicità -->
        <div class="ad-space" id="ad-banner-tool">
            🚀 Il tuo annuncio qui – genera entrate con AdSense
        </div>

        <footer>© 2025 PDFlow</footer>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileNameDisplay = document.getElementById('file-name-display');
        const originalSizeSpan = document.getElementById('original-size');
        const compressBtn = document.getElementById('compress-btn');
        const resultPanel = document.getElementById('result-panel');
        const beforeSizeEl = document.getElementById('before-size');
        const afterSizeEl = document.getElementById('after-size');
        const savedBadge = document.getElementById('saved-badge');
        const downloadBtn = document.getElementById('download-btn');

        let originalFile = null;
        let originalSizeBytes = 0;
        let compressedBytes = null;

        // Drag & drop
        ['dragenter','dragover','dragleave','drop'].forEach(e => dropArea.addEventListener(e, p => p.preventDefault() && p.stopPropagation(), false));
        ['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.add('drag-over'), false));
        ['dragleave','drop'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.remove('drag-over'), false));
        dropArea.addEventListener('drop', e => {
            const f = e.dataTransfer.files[0];
            if (f) processFile(f);
        });
        fileInput.addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) processFile(f);
        });

        function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Carica un file PDF.');
                return;
            }
            originalFile = file;
            originalSizeBytes = file.size;
            fileNameDisplay.textContent = file.name;
            originalSizeSpan.textContent = formatBytes(originalSizeBytes);
            fileInfo.classList.add('visible');
            compressBtn.classList.add('visible');
            resultPanel.classList.remove('visible');
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // Compressione
        compressBtn.addEventListener('click', async () => {
            if (!originalFile) return;
            compressBtn.textContent = 'Compressione...';
            compressBtn.disabled = true;

            try {
                const arrayBuffer = await originalFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                // Salva con ottimizzazioni: removeMetadata, objectsPerTick, ecc.
                const compressed = await pdfDoc.save({
                    useObjectStreams: true,
                    addDefaultPage: false,
                    objectsPerTick: 100,
                });
                compressedBytes = compressed;

                // Mostra risultato
                beforeSizeEl.textContent = formatBytes(originalSizeBytes);
                afterSizeEl.textContent = formatBytes(compressed.length);
                const reduction = originalSizeBytes - compressed.length;
                const percent = originalSizeBytes > 0 ? Math.round((reduction / originalSizeBytes) * 100) : 0;
                savedBadge.textContent = percent > 0
                    ? `Risparmiato ${formatBytes(reduction)} (−${percent}%)`
                    : 'Dimensione già ottimale';
                resultPanel.classList.add('visible');
            } catch (error) {
                alert('Errore durante la compressione: ' + error.message);
            } finally {
                compressBtn.textContent = 'Comprimi PDF';
                compressBtn.disabled = false;
            }
        });

        // Download
        downloadBtn.addEventListener('click', () => {
            if (!compressedBytes) return;
            const blob = new Blob([compressedBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'compresso.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
