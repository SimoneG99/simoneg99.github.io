    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; color: #fff; padding: 2rem;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; flex: 1; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .back-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-link:hover { color: #ffd200; }
        #lang-switcher { display: flex; gap: 0.5rem; }
        .flag { width: 30px; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
        .flag.active, .flag:hover { opacity: 1; }
        .tool-header { margin-bottom: 2rem; }
        .tool-header h1 {
            font-size: 2.5rem; font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
        }
        .tool-header p { color: rgba(255,255,255,0.6); font-size: 1rem; }
        .upload-area {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 24px;
            padding: 3rem 1.5rem; text-align: center; transition: background 0.2s, border-color 0.2s; margin-bottom: 2rem;
        }
        .upload-area.drag-over { background: rgba(255,255,255,0.1); border-color: #ffd200; }
        .upload-area input { display: none; }
        .upload-label { color: rgba(255,255,255,0.8); font-size: 1rem; cursor: pointer; display: block; }
        .upload-label span { text-decoration: underline; color: #ffd200; font-weight: 600; }
        .sort-bar { display: none; align-items: center; gap: 0.75rem; margin: 1.5rem 0 1rem; flex-wrap: wrap; }
        .sort-bar.visible { display: flex; }
        .sort-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
        }
        .sort-btn:hover { background: rgba(255,255,255,0.15); }
        .file-list { list-style: none; display: none; flex-direction: column; gap: 0.75rem; }
        .file-list.visible { display: flex; }
        .file-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 0.75rem; display: flex; align-items: center; gap: 1rem; cursor: grab;
        }
        .file-item.drag-ghost { opacity: 0.3; }
        .file-thumb { width: 48px; height: 64px; background: white; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
        .file-details { flex: 1; min-width: 0; }
        .file-name-text { font-size: 0.9rem; word-break: break-word; }
        .file-meta { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.2rem; }
        .file-remove {
            background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer;
            font-size: 1.2rem; padding: 0.5rem; flex-shrink: 0;
        }
        .file-remove:hover { color: #ff5555; }
        .btn-merge {
            background: linear-gradient(135deg, #f7971e, #ffd200); border: none; padding: 0.8rem 2rem;
            border-radius: 50px; font-weight: 600; color: #1a1a2e; margin-top: 2rem;
            cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: none; font-size: 1rem;
        }
        .btn-merge.visible { display: inline-block; }
        .btn-merge:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-merge:disabled { opacity: 0.6; cursor: not-allowed; }
        .ad-space { width: 100%; margin-top: 2rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; min-height: 90px; display: flex; align-items: center; justify-content: center; }
        footer { margin-top: 2rem; padding: 2rem 0 0; color: rgba(255,255,255,0.3); font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="back-link" data-i18n="backHome">← Torna alla home</a>
            <div id="lang-switcher">
                <img src="https://flagcdn.com/w40/it.png" class="flag" data-lang="it" alt="Italiano">
                <img src="https://flagcdn.com/w40/gb.png" class="flag" data-lang="en" alt="English">
                <img src="https://flagcdn.com/w40/es.png" class="flag" data-lang="es" alt="Español">
                <img src="https://flagcdn.com/w40/fr.png" class="flag" data-lang="fr" alt="Français">
                <img src="https://flagcdn.com/w40/de.png" class="flag" data-lang="de" alt="Deutsch">
            </div>
        </div>

        <div class="tool-header">
            <h1 data-i18n="toolTitle_merge">Unisci PDF</h1>
            <p data-i18n="toolDesc_merge">Carica due o più PDF, guarda l’anteprima e riordinali come vuoi. Poi scarica il file unito.</p>
        </div>

        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf" multiple>
            <label for="file-input" class="upload-label">
                <span data-i18n="uploadLabel">Trascina qui i tuoi PDF<br>oppure <span>clicca per caricarli</span></span>
            </label>
        </div>

        <div class="sort-bar" id="sort-bar">
            <span data-i18n="sortLabel">Ordina:</span>
            <button class="sort-btn" data-sort="az" data-i18n="sortAZ">A → Z</button>
            <button class="sort-btn" data-sort="za" data-i18n="sortZA">Z → A</button>
            <button class="sort-btn" data-sort="date" data-i18n="sortDate">Data</button>
        </div>

        <ul class="file-list" id="file-list"></ul>

        <button class="btn-merge" id="merge-btn" data-i18n="mergeBtn">Unisci PDF</button>

        <div class="ad-space">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-8010540950271616"
                 data-ad-slot="IL_TUO_SLOT"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <footer data-i18n="footer">© 2025 PDFlow</footer>
    </div>

    <script src="translations.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const sortBar = document.getElementById('sort-bar');
        const fileListEl = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');

        let pdfItems = [];

        ['dragenter','dragover','dragleave','drop'].forEach(e => dropArea.addEventListener(e, p => p.preventDefault() && p.stopPropagation(), false));
        ['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.add('drag-over'), false));
        ['dragleave','drop'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.remove('drag-over'), false));
        dropArea.addEventListener('drop', e => {
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length) addFiles(files);
        });
        fileInput.addEventListener('change', e => {
            const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
            if (files.length) addFiles(files);
        });

        async function addFiles(files) {
            for (const file of files) {
                const thumb = await generateThumbnail(file);
                pdfItems.push({ file, name: file.name, lastModified: file.lastModified, thumbnail: thumb });
            }
            renderList();
            updateMergeButton();
            fileInput.value = '';
        }

        async function generateThumbnail(file) {
            try {
                const ab = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                return canvas.toDataURL();
            } catch { return null; }
        }

        function removeFile(index) { pdfItems.splice(index, 1); renderList(); updateMergeButton(); }
        function updateMergeButton() {
            mergeBtn.classList.toggle('visible', pdfItems.length >= 2);
            sortBar.classList.toggle('visible', pdfItems.length >= 2);
            fileListEl.classList.toggle('visible', pdfItems.length > 0);
        }

        function renderList() {
            fileListEl.innerHTML = '';
            pdfItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'file-item'; li.draggable = true; li.dataset.index = index;
                const thumbImg = item.thumbnail ? `<img src="${item.thumbnail}" class="file-thumb" alt="anteprima">` : `<div class="file-thumb" style="background:rgba(255,255,255,0.1);"></div>`;
                const dateStr = new Date(item.lastModified).toLocaleDateString('it');
                li.innerHTML = `${thumbImg}<div class="file-details"><div class="file-name-text">📄 ${item.name}</div><div class="file-meta">${dateStr}</div></div><button class="file-remove" data-index="${index}">✕</button>`;
                li.querySelector('.file-remove').addEventListener('click', e => removeFile(parseInt(e.target.dataset.index)));
                li.addEventListener('dragstart', handleDragStart); li.addEventListener('dragover', e => e.preventDefault());
                li.addEventListener('drop', handleDropReorder); li.addEventListener('dragend', handleDragEnd);
                fileListEl.appendChild(li);
            });
        }

        let dragSrcIndex = null;
        function handleDragStart(e) { dragSrcIndex = parseInt(e.currentTarget.dataset.index); e.currentTarget.classList.add('drag-ghost'); }
        function handleDropReorder(e) {
            e.preventDefault(); const targetIndex = parseInt(e.currentTarget.dataset.index);
            if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                const moved = pdfItems.splice(dragSrcIndex, 1)[0];
                pdfItems.splice(targetIndex, 0, moved); renderList();
            }
        }
        function handleDragEnd(e) { e.currentTarget.classList.remove('drag-ghost'); }

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const sortType = btn.dataset.sort;
                if (sortType === 'az') pdfItems.sort((a,b) => a.name.localeCompare(b.name, 'it', { sensitivity:'base' }));
                else if (sortType === 'za') pdfItems.sort((a,b) => b.name.localeCompare(a.name, 'it', { sensitivity:'base' }));
                else if (sortType === 'date') pdfItems.sort((a,b) => a.lastModified - b.lastModified);
                renderList();
            });
        });

        mergeBtn.addEventListener('click', async () => {
            if (pdfItems.length < 2) return;
            mergeBtn.textContent = 'Unione...'; mergeBtn.disabled = true;
            try {
                const mergedDoc = await PDFLib.PDFDocument.create();
                for (const item of pdfItems) {
                    const srcDoc = await PDFLib.PDFDocument.load(await item.file.arrayBuffer());
                    const copiedPages = await mergedDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                    copiedPages.forEach(p => mergedDoc.addPage(p));
                }
                const mergedBytes = await mergedDoc.save();
                const blob = new Blob([mergedBytes], { type: 'application/pdf' });
                // Salva in sessionStorage per download.html
                const reader = new FileReader();
                reader.onload = () => {
                    sessionStorage.setItem('resultPdf', reader.result);
                    sessionStorage.setItem('resultFileName', 'unito.pdf');
                    window.open('download.html?tool=merge', '_blank');
                };
                reader.readAsDataURL(blob);
            } catch (e) { alert('Errore: ' + e.message); }
            finally { mergeBtn.textContent = 'Unisci PDF'; mergeBtn.disabled = false; }
        });
    </script>
</body>
</html>
