<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unisci PDF – Combina più PDF | PDFlow</title>
    <meta name="description" content="Unisci più file PDF in uno solo. Trascina, riordina e scarica il PDF unito. Gratuito e senza registrazione.">
    <!-- pdf-lib per la manipolazione PDF -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 2rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        /* Lista file */
        .file-list {
            margin-top: 2rem;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .file-item.drag-ghost {
            opacity: 0.4;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            word-break: break-all;
        }

        .file-remove {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 0.5rem;
            transition: color 0.2s;
        }

        .file-remove:hover {
            color: #ff5555;
        }

        .btn-merge {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 2rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: none;
            font-size: 1rem;
        }

        .btn-merge.visible {
            display: inline-block;
        }

        .btn-merge:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-merge:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>Unisci PDF</h1>
            <p>Carica due o più PDF, trascinali per riordinarli, e scarica un unico file combinato.</p>
        </div>

        <!-- Area upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf" multiple>
            <label for="file-input" class="upload-label" id="upload-label">
                Trascina qui i tuoi PDF<br>oppure <span>clicca per caricarli</span>
            </label>
        </div>

        <!-- Elenco file -->
        <ul class="file-list" id="file-list"></ul>

        <button class="btn-merge" id="merge-btn">Unisci PDF</button>

        <!-- Spazio pubblicità -->
        <div class="ad-space" id="ad-banner-tool">
            🚀 Il tuo annuncio qui – genera entrate con AdSense
        </div>

        <footer>
            © 2025 PDFlow
        </footer>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileListEl = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');
        const uploadLabel = document.getElementById('upload-label');

        // Array dei file PDF selezionati (nell'ordine attuale)
        let pdfFiles = [];

        // Gestione drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
        });

        dropArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);

        function handleDrop(e) {
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            addFiles(files);
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
            addFiles(files);
        }

        function addFiles(files) {
            pdfFiles.push(...files);
            renderFileList();
            updateMergeButton();
            fileInput.value = ''; // permette di riselezionare lo stesso file
        }

        function removeFile(index) {
            pdfFiles.splice(index, 1);
            renderFileList();
            updateMergeButton();
        }

        function renderFileList() {
            fileListEl.innerHTML = '';
            pdfFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.draggable = true;
                li.dataset.index = index;

                li.innerHTML = `
                    <div class="file-name">
                        <span>📄</span>
                        <span>${file.name}</span>
                    </div>
                    <button class="file-remove" data-index="${index}">✕</button>
                `;

                // Rimozione
                li.querySelector('.file-remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFile(index);
                });

                // Drag per riordino
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('drop', handleDropReorder);
                li.addEventListener('dragend', handleDragEnd);

                fileListEl.appendChild(li);
            });
        }

        // ---- Riordino tramite drag ----
        let dragSrcIndex = null;

        function handleDragStart(e) {
            dragSrcIndex = parseInt(e.currentTarget.dataset.index);
            e.currentTarget.classList.add('drag-ghost');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcIndex);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDropReorder(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.currentTarget.dataset.index);
            if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                // Sposta l'elemento
                const movedFile = pdfFiles.splice(dragSrcIndex, 1)[0];
                pdfFiles.splice(targetIndex, 0, movedFile);
                renderFileList();
            }
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('drag-ghost');
            dragSrcIndex = null;
        }

        function updateMergeButton() {
            if (pdfFiles.length >= 2) {
                mergeBtn.classList.add('visible');
            } else {
                mergeBtn.classList.remove('visible');
            }
        }

        // ---- Unione PDF ----
        mergeBtn.addEventListener('click', async () => {
            if (pdfFiles.length < 2) return;

            mergeBtn.textContent = 'Unione in corso...';
            mergeBtn.disabled = true;

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                for (const file of pdfFiles) {
                    const arrayBuffer = await file.arrayBuffer();
                    const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(srcDoc, srcDoc.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                }

                const mergedPdfBytes = await mergedPdf.save();
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                // Avvia download automatico
                const a = document.createElement('a');
                a.href = url;
                a.download = 'unito.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                mergeBtn.textContent = 'Unisci PDF';
                mergeBtn.disabled = false;
            } catch (error) {
                alert('Errore durante l\'unione: ' + error.message);
                mergeBtn.textContent = 'Unisci PDF';
                mergeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
