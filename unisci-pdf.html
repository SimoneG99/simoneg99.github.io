<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unisci PDF – Combina più PDF con anteprima | PDFlow</title>
    <meta name="description" content="Unisci più PDF in uno solo. Carica, visualizza anteprime, riordina con drag & drop o pulsanti A-Z, Z-A e per data. Gratuito e senza registrazione.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 2rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        /* Barra ordinamenti */
        .sort-bar {
            display: none;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }

        .sort-bar.visible {
            display: flex;
        }

        .sort-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .sort-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: #ffd200;
        }

        /* Lista file */
        .file-list {
            list-style: none;
            display: none;
            flex-direction: column;
            gap: 0.75rem;
        }

        .file-list.visible {
            display: flex;
        }

        .file-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: grab;
            transition: background 0.2s, border-color 0.2s;
        }

        .file-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .file-item.drag-ghost {
            opacity: 0.3;
        }

        .file-thumb {
            width: 48px;
            height: 64px;
            background: white;
            border-radius: 4px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name-text {
            font-size: 0.9rem;
            word-break: break-word;
        }

        .file-meta {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.2rem;
        }

        .file-remove {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .file-remove:hover {
            color: #ff5555;
        }

        .btn-merge {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 2rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: none;
            font-size: 1rem;
            width: fit-content;
        }

        .btn-merge.visible {
            display: inline-block;
        }

        .btn-merge:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-merge:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>Unisci PDF</h1>
            <p>Carica due o più PDF, guarda l’anteprima e riordinali come vuoi. Poi scarica il file unito.</p>
        </div>

        <!-- Upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf" multiple>
            <label for="file-input" class="upload-label">
                Trascina qui i tuoi PDF<br>oppure <span>clicca per caricarli</span>
            </label>
        </div>

        <!-- Pulsanti ordinamento -->
        <div class="sort-bar" id="sort-bar">
            <span style="font-size:0.85rem; color: rgba(255,255,255,0.6);">Ordina:</span>
            <button class="sort-btn" data-sort="az">A → Z</button>
            <button class="sort-btn" data-sort="za">Z → A</button>
            <button class="sort-btn" data-sort="date">Data</button>
        </div>

        <!-- Lista file -->
        <ul class="file-list" id="file-list"></ul>

        <button class="btn-merge" id="merge-btn">Unisci PDF</button>

<div class="ad-space">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-8010540950271616"
         data-ad-slot="IL_TUO_SLOT"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const sortBar = document.getElementById('sort-bar');
        const fileListEl = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');

        // Array di oggetti: { file, name, lastModified, thumbnail, bytes }
        let pdfItems = [];

        // Drag & drop (caricamento file)
        ['dragenter','dragover','dragleave','drop'].forEach(e => dropArea.addEventListener(e, p => p.preventDefault() && p.stopPropagation(), false));
        ['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.add('drag-over'), false));
        ['dragleave','drop'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.remove('drag-over'), false));
        dropArea.addEventListener('drop', e => {
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length) addFiles(files);
        });
        fileInput.addEventListener('change', e => {
            const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
            if (files.length) addFiles(files);
        });

        async function addFiles(files) {
            for (const file of files) {
                const thumb = await generateThumbnail(file);
                pdfItems.push({
                    file,
                    name: file.name,
                    lastModified: file.lastModified,
                    thumbnail: thumb,
                    bytes: null // caricato al momento del merge
                });
            }
            renderList();
            updateMergeButton();
            fileInput.value = '';
        }

        async function generateThumbnail(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                return canvas.toDataURL();
            } catch {
                return null; // se fallisce, nessuna anteprima
            }
        }

        function removeFile(index) {
            pdfItems.splice(index, 1);
            renderList();
            updateMergeButton();
        }

        function updateMergeButton() {
            mergeBtn.classList.toggle('visible', pdfItems.length >= 2);
            sortBar.classList.toggle('visible', pdfItems.length >= 2);
            fileListEl.classList.toggle('visible', pdfItems.length > 0);
        }

        function renderList() {
            fileListEl.innerHTML = '';
            pdfItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.draggable = true;
                li.dataset.index = index;

                const thumbImg = item.thumbnail
                    ? `<img src="${item.thumbnail}" class="file-thumb" alt="anteprima">`
                    : `<div class="file-thumb" style="background:rgba(255,255,255,0.1);"></div>`;

                const dateStr = new Date(item.lastModified).toLocaleDateString('it-IT', {
                    day: 'numeric', month: 'short', year: 'numeric'
                });

                li.innerHTML = `
                    ${thumbImg}
                    <div class="file-details">
                        <div class="file-name-text">📄 ${item.name}</div>
                        <div class="file-meta">${dateStr}</div>
                    </div>
                    <button class="file-remove" data-index="${index}">✕</button>
                `;

                li.querySelector('.file-remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFile(parseInt(e.target.dataset.index));
                });

                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', e => e.preventDefault());
                li.addEventListener('drop', handleDropReorder);
                li.addEventListener('dragend', handleDragEnd);

                fileListEl.appendChild(li);
            });
        }

        // ---- Riordino drag & drop ----
        let dragSrcIndex = null;

        function handleDragStart(e) {
            dragSrcIndex = parseInt(e.currentTarget.dataset.index);
            e.currentTarget.classList.add('drag-ghost');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDropReorder(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.currentTarget.dataset.index);
            if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                const moved = pdfItems.splice(dragSrcIndex, 1)[0];
                pdfItems.splice(targetIndex, 0, moved);
                renderList();
            }
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('drag-ghost');
            dragSrcIndex = null;
        }

        // ---- Pulsanti ordinamento ----
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const sortType = btn.dataset.sort;
                if (sortType === 'az') {
                    pdfItems.sort((a, b) => a.name.localeCompare(b.name, 'it', { sensitivity: 'base' }));
                } else if (sortType === 'za') {
                    pdfItems.sort((a, b) => b.name.localeCompare(a.name, 'it', { sensitivity: 'base' }));
                } else if (sortType === 'date') {
                    pdfItems.sort((a, b) => a.lastModified - b.lastModified);
                }
                renderList();
            });
        });

        // ---- Unione PDF ----
        mergeBtn.addEventListener('click', async () => {
            if (pdfItems.length < 2) return;
            mergeBtn.textContent = 'Unione in corso...';
            mergeBtn.disabled = true;

            try {
                const mergedDoc = await PDFLib.PDFDocument.create();
                for (const item of pdfItems) {
                    const arrayBuffer = await item.file.arrayBuffer();
                    const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                    copiedPages.forEach(page => mergedDoc.addPage(page));
                }
                const mergedBytes = await mergedDoc.save();
                const blob = new Blob([mergedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'unito.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                alert('Errore durante l\'unione: ' + error.message);
            } finally {
                mergeBtn.textContent = 'Unisci PDF';
                mergeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
