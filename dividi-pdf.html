<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividi PDF – Estrai o separa pagine | PDFlow</title>
    <meta name="description" content="Dividi un PDF in singole pagine o estrai un intervallo specifico. Anteprima, selezione cliccabile e download immediato, tutto nel browser.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 2.5rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        .preview-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .preview-grid.visible {
            display: grid;
        }

        .page-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-card:hover {
            transform: translateY(-4px);
        }

        .page-card.selected {
            border-color: #ffd200;
            background: rgba(255,215,0,0.1);
        }

        .page-card img {
            width: 100%;
            height: auto;
            display: block;
            background: white;
        }

        .page-number {
            padding: 0.4rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
        }

        .actions-bar {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .actions-bar.visible {
            display: flex;
        }

        .btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-size: 1rem;
            white-space: nowrap;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>Dividi PDF</h1>
            <p>Carica un PDF e seleziona le pagine che vuoi estrarre. Clicca sulle miniature per scegliere.</p>
        </div>

        <!-- Upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input" class="upload-label">
                Trascina qui il tuo PDF<br>oppure <span>clicca per caricarlo</span>
            </label>
        </div>

        <!-- Griglia anteprime -->
        <div class="preview-grid" id="preview-grid"></div>

        <!-- Barra azioni -->
        <div class="actions-bar" id="actions-bar">
            <button class="btn" id="extract-selected-btn">Estrai selezionate</button>
            <button class="btn btn-secondary" id="download-zip-btn">Scarica tutte in ZIP</button>
        </div>

        <!-- Spazio pubblicità -->
        <div class="ad-space" id="ad-banner-tool">
            🚀 Il tuo annuncio qui – genera entrate con AdSense
        </div>

        <footer>© 2025 PDFlow</footer>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const previewGrid = document.getElementById('preview-grid');
        const actionsBar = document.getElementById('actions-bar');
        const extractSelectedBtn = document.getElementById('extract-selected-btn');
        const downloadZipBtn = document.getElementById('download-zip-btn');

        let pdfBytes = null;
        let pdfDoc = null;         // pdf-lib document
        let totalPages = 0;
        let selectedPages = new Set(); // numeri 1‑based

        // Drag & drop
        ['dragenter','dragover','dragleave','drop'].forEach(e => dropArea.addEventListener(e, p => p.preventDefault() && p.stopPropagation(), false));
        ['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.add('drag-over'), false));
        ['dragleave','drop'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.remove('drag-over'), false));
        dropArea.addEventListener('drop', e => {
            const f = e.dataTransfer.files[0];
            if (f) processFile(f);
        });
        fileInput.addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) processFile(f);
        });

        async function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Per favore carica un file PDF.');
                return;
            }
            const arrayBuffer = await file.arrayBuffer();
            pdfBytes = arrayBuffer;
            pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            totalPages = pdfDoc.getPageCount();

            // Genera anteprime
            await generatePreviews(arrayBuffer);
            actionsBar.classList.add('visible');
        }

        async function generatePreviews(data) {
            previewGrid.innerHTML = '';
            selectedPages.clear();
            const pdf = await pdfjsLib.getDocument({ data }).promise;

            for (let i = 1; i <= totalPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.5 }); // miniature leggere
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                const img = document.createElement('img');
                img.src = canvas.toDataURL();

                const card = document.createElement('div');
                card.className = 'page-card selected'; // all'inizio tutte selezionate
                card.dataset.page = i;
                card.addEventListener('click', () => togglePage(i, card));

                const numLabel = document.createElement('div');
                numLabel.className = 'page-number';
                numLabel.textContent = `Pag. ${i}`;

                card.appendChild(img);
                card.appendChild(numLabel);
                previewGrid.appendChild(card);

                selectedPages.add(i);
            }
            previewGrid.classList.add('visible');
        }

        function togglePage(pageNum, card) {
            if (selectedPages.has(pageNum)) {
                selectedPages.delete(pageNum);
                card.classList.remove('selected');
            } else {
                selectedPages.add(pageNum);
                card.classList.add('selected');
            }
        }

        // Estrai le pagine selezionate in un unico PDF
        extractSelectedBtn.addEventListener('click', async () => {
            if (selectedPages.size === 0) {
                alert('Seleziona almeno una pagina.');
                return;
            }
            const pagesToExtract = Array.from(selectedPages).sort((a,b) => a-b);
            extractSelectedBtn.textContent = 'Estrazione...';
            extractSelectedBtn.disabled = true;

            try {
                const newDoc = await PDFLib.PDFDocument.create();
                const copiedPages = await newDoc.copyPages(pdfDoc, pagesToExtract.map(p => p-1));
                copiedPages.forEach(p => newDoc.addPage(p));
                const newBytes = await newDoc.save();
                const blob = new Blob([newBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'estratto.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Errore: ' + e.message);
            } finally {
                extractSelectedBtn.textContent = 'Estrai selezionate';
                extractSelectedBtn.disabled = false;
            }
        });

        // Scarica tutte le pagine in ZIP
        downloadZipBtn.addEventListener('click', async () => {
            if (!pdfDoc) return;
            downloadZipBtn.textContent = 'Creazione ZIP...';
            downloadZipBtn.disabled = true;
            try {
                const zip = new JSZip();
                for (let i = 0; i < totalPages; i++) {
                    const singleDoc = await PDFLib.PDFDocument.create();
                    const [page] = await singleDoc.copyPages(pdfDoc, [i]);
                    singleDoc.addPage(page);
                    const bytes = await singleDoc.save();
                    zip.file(`pagina_${i+1}.pdf`, bytes);
                }
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'pagine_divise.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('Errore: ' + e.message);
            } finally {
                downloadZipBtn.textContent = 'Scarica tutte in ZIP';
                downloadZipBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
