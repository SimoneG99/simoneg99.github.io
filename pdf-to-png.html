<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PNG – Converti PDF in Immagine | PDFlow</title>
    <meta name="description" content="Converti le tue pagine PDF in PNG di alta qualità direttamente nel browser, gratis e senza upload. Veloce, sicuro, moderno.">
    <!-- Libreria PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 3rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        .file-name {
            margin-top: 1rem;
            color: #ffd200;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .btn-convert {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: none;
            font-size: 1rem;
        }

        .btn-convert.visible {
            display: inline-block;
        }

        .btn-convert:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            margin-top: 2rem;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .preview-container.visible {
            display: flex;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        .download-link {
            background: rgba(255,255,255,0.1);
            color: #ffd200;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: background 0.2s;
            display: inline-block;
        }

        .download-link:hover {
            background: rgba(255,255,255,0.2);
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>PDF → PNG</h1>
            <p>Trascina un PDF e ottieni ogni pagina come immagine PNG. Tutto nel tuo browser, nessun upload.</p>
        </div>

        <!-- Area di upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input" class="upload-label" id="upload-label">
                Trascina qui il tuo PDF<br>oppure <span>clicca per caricare</span>
            </label>
            <div class="file-name" id="file-name"></div>
        </div>

        <button class="btn-convert" id="convert-btn">Converti in PNG</button>

        <!-- Anteprima e download -->
        <div class="preview-container" id="preview">
            <img id="preview-img" src="" alt="Anteprima PNG">
            <a id="download-link" class="download-link" download="pagina.png">⬇ Scarica PNG</a>
        </div>

        <!-- Spazio pubblicità -->
        <div class="ad-space" id="ad-banner-tool">
            🚀 Il tuo annuncio qui – genera entrate con AdSense
        </div>

        <footer>
            © 2025 PDFlow
        </footer>
    </div>

    <script>
        // Configurazione PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const convertBtn = document.getElementById('convert-btn');
        const previewContainer = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        const downloadLink = document.getElementById('download-link');
        const uploadLabel = document.getElementById('upload-label');

        let selectedFile = null;

        // Gestione drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
        });

        dropArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length) {
                processFile(files[0]);
            }
        }

        function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Per favore carica un file PDF.');
                return;
            }
            selectedFile = file;
            fileNameDisplay.textContent = `📄 ${file.name}`;
            convertBtn.classList.add('visible');
            // Nascondi anteprima precedente
            previewContainer.classList.remove('visible');
            previewImg.src = '';
            downloadLink.href = '#';
        }

        // Conversione PDF -> PNG (prima pagina)
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.textContent = 'Conversione in corso...';
            convertBtn.disabled = true;

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1); // prima pagina
                const viewport = page.getViewport({ scale: 2.0 }); // alta risoluzione

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                // Converti canvas in data URL PNG
                const pngDataUrl = canvas.toDataURL('image/png');

                // Mostra anteprima
                previewImg.src = pngDataUrl;
                downloadLink.href = pngDataUrl;
                downloadLink.download = 'pagina.png';
                previewContainer.classList.add('visible');

                convertBtn.textContent = 'Converti in PNG';
                convertBtn.disabled = false;
            } catch (error) {
                alert('Errore durante la conversione: ' + error.message);
                convertBtn.textContent = 'Converti in PNG';
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
