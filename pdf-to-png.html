<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="back-link" data-i18n="backHome">← Torna alla home</a>
            <div id="lang-switcher">
                <img src="https://flagcdn.com/w40/it.png" class="flag" data-lang="it" alt="Italiano">
                <img src="https://flagcdn.com/w40/gb.png" class="flag" data-lang="en" alt="English">
                <img src="https://flagcdn.com/w40/es.png" class="flag" data-lang="es" alt="Español">
                <img src="https://flagcdn.com/w40/fr.png" class="flag" data-lang="fr" alt="Français">
                <img src="https://flagcdn.com/w40/de.png" class="flag" data-lang="de" alt="Deutsch">
            </div>
        </div>

        <div class="tool-header">
            <h1 data-i18n="toolTitle_png">PDF → PNG</h1>
            <p data-i18n="toolDesc_png">Trascina un PDF e ottieni ogni pagina come immagine PNG. Tutto nel tuo browser, nessun upload.</p>
        </div>

        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input" class="upload-label" id="upload-label">
                <span data-i18n="uploadLabel">Trascina qui il tuo PDF<br>oppure <span>clicca per caricare</span></span>
            </label>
            <div class="file-name" id="file-name"></div>
        </div>

        <button class="btn-convert" id="convert-btn" data-i18n="convertBtn">Converti in PNG</button>

        <div class="preview-container" id="preview">
            <img id="preview-img" src="" alt="Anteprima PNG">
            <a id="download-link" class="download-link" download="pagina.png" data-i18n="downloadBtn">⬇ Scarica PNG</a>
        </div>

        <!-- Primo banner pubblicitario -->
        <div class="ad-space">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-8010540950271616"
                 data-ad-slot="IL_TUO_SLOT"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <footer data-i18n="footer">© 2025 PDFlow</footer>
    </div>

    <script src="translations.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const convertBtn = document.getElementById('convert-btn');
        const previewContainer = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        const downloadLink = document.getElementById('download-link');

        let selectedFile = null;

        // Recupera file salvato in sessione (se presente)
        window.addEventListener('DOMContentLoaded', () => {
            const savedPdf = sessionStorage.getItem('currentPdf');
            if (savedPdf) {
                const byteString = atob(savedPdf.split(',')[1]);
                const mimeString = savedPdf.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                selectedFile = new File([ab], 'documento.pdf', { type: mimeString });
                fileNameDisplay.textContent = '📄 documento.pdf';
                convertBtn.classList.add('visible');
            }
        });

        // Drag & drop
        ['dragenter','dragover','dragleave','drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        ['dragenter','dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
        });
        ['dragleave','drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
        });
        dropArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);

        function handleDrop(e) {
            const files = e.dataTransfer.files;
            if (files.length) processFile(files[0]);
        }
        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length) processFile(files[0]);
        }

        function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Per favore carica un file PDF.');
                return;
            }
            selectedFile = file;
            // Salva in sessionStorage
            const reader = new FileReader();
            reader.onload = function(e) {
                sessionStorage.setItem('currentPdf', e.target.result);
            };
            reader.readAsDataURL(file);
            fileNameDisplay.textContent = '📄 ' + file.name;
            convertBtn.classList.add('visible');
            previewContainer.classList.remove('visible');
            previewImg.src = '';
            downloadLink.href = '#';
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            convertBtn.textContent = 'Conversione...';
            convertBtn.disabled = true;

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                const pngDataUrl = canvas.toDataURL('image/png');
                // Salva risultato in sessionStorage per la pagina download
                sessionStorage.setItem('resultPng', pngDataUrl);
                sessionStorage.setItem('resultFileName', 'pagina.png');

                // Mostra anteprima per feedback immediato
                previewImg.src = pngDataUrl;
                previewContainer.classList.add('visible');

                // Prepara link per download (l'utente può anche scaricare subito)
                downloadLink.href = pngDataUrl;
                downloadLink.style.display = 'inline-block';

                convertBtn.textContent = 'Converti in PNG';
                convertBtn.disabled = false;

                // Apri automaticamente la pagina di download (nuova finestra)
                window.open('download.html?tool=png', '_blank');
            } catch (error) {
                alert('Errore: ' + error.message);
                convertBtn.textContent = 'Converti in PNG';
                convertBtn.disabled = false;
            }
        });
    </script>
