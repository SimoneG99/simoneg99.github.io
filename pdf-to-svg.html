<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to SVG – Esporta in SVG scalabile | PDFlow</title>
    <meta name="description" content="Converti le tue pagine PDF in file SVG scalabili. Anteprima immediata e download gratuito, tutto nel browser.">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .back-link {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffd200;
        }

        .tool-header {
            margin-bottom: 3rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 1.5rem;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 2rem;
        }

        .upload-area.drag-over {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd200;
        }

        .upload-area input {
            display: none;
        }

        .upload-label {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }

        .upload-label span {
            text-decoration: underline;
            color: #ffd200;
            font-weight: 600;
        }

        .file-name {
            margin-top: 1rem;
            color: #ffd200;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .btn-convert {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 1rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: none;
            font-size: 1rem;
        }

        .btn-convert.visible {
            display: inline-block;
        }

        .btn-convert:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-convert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            margin-top: 2rem;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .preview-container.visible {
            display: flex;
        }

        .svg-preview {
            width: 100%;
            max-height: 500px;
            overflow: auto;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .svg-preview svg {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .download-link {
            background: rgba(255,255,255,0.1);
            color: #ffd200;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: background 0.2s;
            display: inline-block;
        }

        .download-link:hover {
            background: rgba(255,255,255,0.2);
        }

        .ad-space {
            width: 100%;
            margin-top: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 2rem;
            padding: 2rem 0 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Torna alla home</a>

        <div class="tool-header">
            <h1>PDF → SVG</h1>
            <p>Ottieni un file SVG contenente la pagina del tuo PDF. Scalabile, leggero, sempre funzionante.</p>
        </div>

        <!-- Area di upload -->
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept=".pdf">
            <label for="file-input" class="upload-label" id="upload-label">
                Trascina qui il tuo PDF<br>oppure <span>clicca per caricare</span>
            </label>
            <div class="file-name" id="file-name"></div>
        </div>

        <button class="btn-convert" id="convert-btn">Converti in SVG</button>

        <!-- Anteprima e download -->
        <div class="preview-container" id="preview">
            <div class="svg-preview" id="svg-preview"></div>
            <a id="download-link" class="download-link" download="pagina.svg">⬇ Scarica SVG</a>
        </div>

        <!-- Spazio pubblicità -->
        <div class="ad-space" id="ad-banner-tool">
            🚀 Il tuo annuncio qui – genera entrate con AdSense
        </div>

        <footer>
            © 2025 PDFlow
        </footer>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const convertBtn = document.getElementById('convert-btn');
        const previewContainer = document.getElementById('preview');
        const svgPreviewDiv = document.getElementById('svg-preview');
        const downloadLink = document.getElementById('download-link');

        let selectedFile = null;

        // Drag & drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('drag-over'), false);
        });

        dropArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) processFile(files[0]);
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length) processFile(files[0]);
        }

        function processFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Per favore carica un file PDF.');
                return;
            }
            selectedFile = file;
            fileNameDisplay.textContent = `📄 ${file.name}`;
            convertBtn.classList.add('visible');
            previewContainer.classList.remove('visible');
            svgPreviewDiv.innerHTML = '';
            downloadLink.href = '#';
        }

        // Conversione: PDF → Canvas → PNG → SVG con <image>
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.textContent = 'Conversione in corso...';
            convertBtn.disabled = true;

            try {
                // 1. Carica il PDF
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 }); // alta risoluzione per l'immagine interna

                // 2. Renders su canvas
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: context, viewport }).promise;

                // 3. Estrai PNG come data URL
                const pngDataUrl = canvas.toDataURL('image/png');

                // 4. Costruisci l'SVG con l'immagine
                const svgString = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${viewport.width}" height="${viewport.height}" viewBox="0 0 ${viewport.width} ${viewport.height}">
    <image width="${viewport.width}" height="${viewport.height}" xlink:href="${pngDataUrl}"/>
</svg>`;

                // Mostra anteprima
                svgPreviewDiv.innerHTML = svgString;
                previewContainer.classList.add('visible');

                // Prepara download
                const blob = new Blob([svgString], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                downloadLink.href = url;
                downloadLink.download = 'pagina.svg';

                convertBtn.textContent = 'Converti in SVG';
                convertBtn.disabled = false;
            } catch (error) {
                alert('Errore durante la conversione: ' + error.message);
                convertBtn.textContent = 'Converti in SVG';
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
